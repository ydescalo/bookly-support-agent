<svg width="1600" height="1600" viewBox="0 0 1600 1600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="1600" fill="#F6F7F9"/>
  <text x="80" y="86" fill="#1B1F24" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="800">Bookly Support Agent Architecture</text>
  <text x="82" y="126" fill="#55606D" font-family="Inter, Arial, sans-serif" font-size="24">Top-down flow for Workflow mode and AI agent mode</text>

  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L12 7 L2 12 Z" fill="#0F766E"/>
    </marker>
    <marker id="arrowDark" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L12 7 L2 12 Z" fill="#12343B"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#1F2937" flood-opacity="0.14"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <rect x="460" y="185" width="680" height="175" rx="12" fill="#FFFFFF" stroke="#D8E2EA" stroke-width="2"/>
    <text x="500" y="234" fill="#0F766E" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">Start</text>
    <text x="500" y="276" fill="#1B1F24" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="800">Customer Chat UI + Session Memory</text>
    <text x="500" y="313" fill="#55606D" font-family="Inter, Arial, sans-serif" font-size="18">React app stores intent, email, active order, return reason, and chat turns</text>
    <text x="500" y="340" fill="#55606D" font-family="Inter, Arial, sans-serif" font-size="18">The same memory feeds both Workflow mode and AI agent mode</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="140" y="555" width="500" height="160" rx="12" fill="#FFFFFF" stroke="#D8E2EA" stroke-width="2"/>
    <text x="180" y="606" fill="#0F766E" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">Workflow Mode</text>
    <text x="180" y="648" fill="#1B1F24" font-family="Inter, Arial, sans-serif" font-size="31" font-weight="800">Workflow Orchestrator</text>
    <text x="180" y="686" fill="#55606D" font-family="Inter, Arial, sans-serif" font-size="18">Deterministic local logic routes intent, fills slots, verifies, acts, escalates</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="930" y="555" width="500" height="160" rx="12" fill="#FFFFFF" stroke="#D8E2EA" stroke-width="2"/>
    <text x="970" y="606" fill="#0F766E" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">AI Agent Mode</text>
    <text x="970" y="648" fill="#1B1F24" font-family="Inter, Arial, sans-serif" font-size="31" font-weight="800">POST /api/agent</text>
    <text x="970" y="684" fill="#55606D" font-family="Inter, Arial, sans-serif" font-size="17">Receives memory, recent history, model, and session key</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="930" y="820" width="500" height="160" rx="12" fill="#12343B" stroke="#12343B" stroke-width="2"/>
    <text x="970" y="871" fill="#8EE4D7" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">OpenAI</text>
    <text x="970" y="913" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="31" font-weight="800">Responses API</text>
    <text x="970" y="951" fill="#D7E5E8" font-family="Inter, Arial, sans-serif" font-size="18">Reasons over context and requests backend tool calls</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="415" y="910" width="555" height="205" rx="12" fill="#FFFFFF" stroke="#D8E2EA" stroke-width="2"/>
    <text x="455" y="962" fill="#0F766E" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">Shared Bookly Tools</text>
    <text x="455" y="1004" fill="#1B1F24" font-family="Inter, Arial, sans-serif" font-size="31" font-weight="800">Mocked Systems + Actions</text>
    <text x="455" y="1050" fill="#55606D" font-family="Inter, Arial, sans-serif" font-size="19">Order data • Return policy • Support cases</text>
    <text x="455" y="1084" fill="#55606D" font-family="Inter, Arial, sans-serif" font-size="19">Verification • Return creation • Escalation</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="930" y="1155" width="500" height="150" rx="12" fill="#FFFFFF" stroke="#D8E2EA" stroke-width="2"/>
    <text x="970" y="1206" fill="#0F766E" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">AI Response Assembly</text>
    <text x="970" y="1248" fill="#1B1F24" font-family="Inter, Arial, sans-serif" font-size="31" font-weight="800">Backend Finalizes Reply</text>
    <text x="970" y="1286" fill="#55606D" font-family="Inter, Arial, sans-serif" font-size="18">Tool outputs return to the backend/model loop first</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="540" y="1395" width="520" height="135" rx="12" fill="#FFFFFF" stroke="#D8E2EA" stroke-width="2"/>
    <text x="580" y="1444" fill="#0F766E" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">End</text>
    <text x="580" y="1484" fill="#1B1F24" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800">Customer-Facing Response</text>
    <text x="580" y="1518" fill="#55606D" font-family="Inter, Arial, sans-serif" font-size="18">Chat bubble only; tool trace stays in side panel</text>
  </g>

  <path d="M690 360 C540 430 420 485 390 540" stroke="#0F766E" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M910 360 C1040 430 1155 485 1180 540" stroke="#12343B" stroke-width="5" marker-end="url(#arrowDark)"/>

  <path d="M390 715 C390 805 500 860 585 895" stroke="#0F766E" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M1180 715 V805" stroke="#12343B" stroke-width="5" marker-end="url(#arrowDark)"/>

  <path d="M960 900 C900 900 850 910 815 895" stroke="#12343B" stroke-width="5" marker-end="url(#arrowDark)"/>
  <path d="M970 1030 C1025 1070 1110 1075 1180 995" stroke="#12343B" stroke-width="5" marker-end="url(#arrowDark)"/>

  <path d="M1180 980 V1140" stroke="#12343B" stroke-width="5" marker-end="url(#arrowDark)"/>

  <path d="M675 1115 C675 1240 700 1335 755 1380" stroke="#0F766E" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M1180 1305 C1180 1365 1115 1408 1075 1430" stroke="#12343B" stroke-width="5" marker-end="url(#arrowDark)"/>
</svg>
